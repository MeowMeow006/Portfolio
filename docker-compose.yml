services:
  web:
    build: .
    container_name: meow-web
    ports:
      - "8084:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=app
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=user_db

  db:
    image: mysql:8.0
    container_name: meow-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_db
      MYSQL_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 15
      start_period: 30s

volumes:
  db_data: